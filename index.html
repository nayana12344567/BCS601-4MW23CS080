<!DOCTYPE html>
<html>
<head>
    <title>BCS601 Project</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding: 40px;
        }
        .box {
            background: white;
            padding: 20px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        input, button {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>BCS601 Project</h2>

    <input type="number" id="num1" placeholder="Enter number 1">
    <input type="number" id="num2" placeholder="Enter number 2">
    <input type="text" id="text" placeholder="Enter string">

    <button onclick="calculate()">Submit</button>

    <div id="output"></div>
</div>

<script>
function gcd(a, b) {
    return b === 0 ? a : gcd(b, a % b);
}

function factorial(n) {
    let f = 1;
    for (let i = 1; i <= n; i++) f *= i;
    return f;
}

function calculate() {
    let a = parseInt(document.getElementById("num1").value);
    let b = parseInt(document.getElementById("num2").value);
    let text = document.getElementById("text").value;

    let hcf = gcd(a, b);
    let lcm = (a * b) / hcf;
    let rev = text.split("").reverse().join("");

    let factHTML = "";
    for (let i = 4; i <= 8; i++) {
        factHTML += `<p>${i}! = ${factorial(i)}</p>`;
    }

    document.getElementById("output").innerHTML =
        `<h3>Results</h3>
         HCF: ${hcf}<br>
         LCM: ${lcm}<br>
         Reversed: ${rev}
         <h4>Factorials</h4>
         ${factHTML}`;
}
</script>

</body>
</html>
